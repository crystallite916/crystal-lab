# Pre-commit hooks configuration
# Automatically runs code quality checks before each git commit
#
# Setup (one-time):
#   pip install pre-commit
#   pre-commit install
#
# Usage:
#   Hooks run automatically on 'git commit'
#   To skip hooks: git commit --no-verify
#   To run manually: pre-commit run --all-files

repos:
  # Black - Python code formatter
  # Automatically formats code to PEP 8 style
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        name: Format Python code with Black
        language_version: python3
        args: [--line-length=100]
        exclude: ^(\.venv|env|\.git)/

  # Flake8 - Python linter
  # Checks for code quality issues (unused imports, syntax errors, etc.)
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Lint Python code with Flake8
        args: [--max-line-length=100, --extend-ignore=E203]
        exclude: ^(\.venv|env|\.git)/

  # Built-in pre-commit hooks
  # General file quality checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Remove trailing whitespace
      - id: trailing-whitespace
        name: Remove trailing whitespace
        exclude: ^(\.venv|env|\.git)/

      # Ensure files end with a newline
      - id: end-of-file-fixer
        name: Fix end of files
        exclude: ^(\.venv|env|\.git)/

      # Check for files that would conflict on case-insensitive filesystems
      - id: check-case-conflict
        name: Check for case conflicts

      # Check YAML syntax
      - id: check-yaml
        name: Check YAML syntax
        exclude: ^(\.venv|env|\.git)/

      # Check for large files (>500KB)
      - id: check-added-large-files
        name: Check for large files
        args: [--maxkb=500]

# Configuration notes:
# - Line length set to 100 (common for data science projects)
# - E203 ignored in flake8 (conflicts with Black's formatting)
# - Virtual environments (.venv, env) excluded from all checks
# - Hooks prevent direct commits to main/master (use branches + PRs)
